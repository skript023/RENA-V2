server {
    listen 80;
    server_name dashpro.ytzyar.cc;  # Ganti dengan IP/domain kamu

    root /var/www/downloader/dashboard/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires max;
        log_not_found off;
    }
}
