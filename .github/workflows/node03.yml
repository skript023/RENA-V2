name: Deploy Vue App To Node03

on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build-and-deploy-node01:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean install
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Write production .env file
        run: |
          echo "VITE_ENVIRONMENT=production" >> .env
          echo "VITE_BACKEND_URL_PROD=https://bucketx1.ytzyar.cc" >> .env
          echo "VITE_BACKEND_URL_PROD_1=https://bucketx2.ytzyar.cc" >> .env
          echo "VITE_BACKEND_URL_PROD_2=https://bucketx3.ytzyar.cc" >> .env
          echo "VITE_BACKEND_URL_DEV=http://localhost:8083" >> .env
          echo "VITE_ENCRPYPT_KEY=Gu2s9v$B&E" >> .env
          echo "VITE_INITIALIZATION_VECTOR=Gu2s9v$B&E" >> .env
          echo "VITE_API_KEY=${{ secrets.API_KEY }}" >> .env

      - name: Build Vue app
        run: npm run build

      - name: Upload dist to server via SCP with password
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST_3 }}
          username: ${{ secrets.SERVER_USER_3 }}
          password: ${{ secrets.SERVER_PASSWORD_3 }}
          port: 22
          source: ./dist/*
          target: /var/www/downloader/dashboard

      - name: Upload nginx config to server via SCP with password
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST_3 }}
          username: ${{ secrets.SERVER_USER_3 }}
          password: ${{ secrets.SERVER_PASSWORD_3 }}
          port: 22
          source: ./nginx/*
          target: /var/www/downloader/dashboard

      - name: Check for nginx in sites-enabled
        id: check_nginx_conf
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST_3 }}
          username: ${{ secrets.SERVER_USER_3 }}
          password: ${{ secrets.SERVER_PASSWORD_3 }}
          port: 22
          script: |
            if [ ! -f "/etc/nginx/sites-enabled/dashboard.conf" ]; then
              echo "dashboard.conf not found. Running setup..."
              sudo cp /var/www/downloader/dashboard/nginx/node03-dashboard.conf /var/www/downloader/dashboard/dashboard.conf
              sudo cp /var/www/downloader/dashboard/nginx/setup.sh /var/www/downloader/dashboard/setup.sh
              sudo chmod +x /var/www/downloader/dashboard/setup.sh
              sudo /var/www/downloader/dashboard/setup.sh
            else
              echo "vue.conf already exists. Skipping setup."
            fi
